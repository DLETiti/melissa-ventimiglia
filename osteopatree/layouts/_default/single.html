<!DOCTYPE html>
<html lang="en">
<head>
{{ partial "head.html" . }}
</head>
<body>
{{ partial "icon-sprite.html" . }}
{{ partial "nav.html" . }}

<section class="section section--light">
  <div class="wrap">
    <h1>{{ if eq .Title "Contact" }}<svg class="op-icon op-icon--inline" aria-hidden="true"><use href="#op-icon-contact"></use></svg> {{ end }}{{ .Params.headline | default .Title }}</h1>
    {{ if .Params.placeholder }}
    <p class="content-placeholder"><strong>Draft status:</strong> {{ .Params.placeholder }}</p>
    {{ end }}
    {{ .Content }}
  </div>
</section>

{{ partial "footer.html" . }}
</body>
</html>
